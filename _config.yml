title: By Sloth — Field notes
description: Long-form overland route guides and field notes.
url: "https://bysloth.com"
baseurl: ""

permalink: /blog/:slug/

markdown: kramdown
kramdown:
  input: GFM
  smart_quotes: lsquo,rsquo,ldquo,rdquo

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - supabase-schema.sql
  - supabase-reset.sql
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .claude
  - vendor
  - package.json
  - package-lock.json
  - capacitor.config.ts
  - android

keep_files:
  - public
