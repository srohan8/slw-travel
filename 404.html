<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>By Sloth</title>
</head>
<body>
<script>
(function() {
  var path = window.location.pathname.replace(/\/+$/, '');
  var segs = path.split('/').filter(Boolean);
  var first = segs[0] || '';
  var search = window.location.search;
  var hash = window.location.hash;

  // /journey/:id -> journey.html?trip=:id
  if (first === 'journey' && segs[1]) {
    window.location.replace('/journey.html?trip=' + encodeURIComponent(segs[1]) + hash);
    return;
  }

  // /auth -> auth.html
  if (first === 'auth') {
    window.location.replace('/auth.html' + search + hash);
    return;
  }

  // App SPA paths: /planner /route /trips/* /journals/* /profile /admin
  var appPaths = ['planner','route','trips','journals','profile','admin'];
  if (appPaths.indexOf(first) > -1 || first === 'app') {
    var q = '?p=' + encodeURIComponent(path) + (search ? '&q=' + encodeURIComponent(search.slice(1)) : '');
    window.location.replace('/app/' + q + hash);
    return;
  }

  // Everything else -> home
  window.location.replace('/');
})();
</script>
</body>
</html>
