name: Android Release

on:
  push:
    tags:
      - 'v*'          # e.g. v1.0.0 → auto-deploy to Internal Testing
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '[:space:]' | base64 --decode > android/app/release.keystore
          echo "Keystore size: $(wc -c < android/app/release.keystore) bytes"
          keytool -list -keystore android/app/release.keystore \
            -storepass "$STORE_PASS" \
            -noprompt 2>&1 | head -5

      - name: Write keystore.properties
        env:
          STORE_PASS: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASS" "$KEY_ALIAS" "$KEY_PASS" \
            > android/keystore.properties

      - name: Derive version from tag or run number
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            IFS='.' read -r major minor patch <<< "$TAG"
            CODE=$(( 1000000 + major * 10000 + minor * 100 + ${patch:-0} ))
            NAME="$TAG"
          else
            CODE=$(( 2000000 + ${{ github.run_number }} ))
            NAME="dev.${{ github.run_number }}"
          fi
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Build release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Determine track
        id: track
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "track=internal" >> $GITHUB_OUTPUT
          else
            echo "track=${{ inputs.track }}" >> $GITHUB_OUTPUT
          fi

      - name: Decode service account JSON
        run: |
          echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" | tr -d '[:space:]' | base64 --decode > play-service-account.json

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-service-account.json
          packageName: com.bysloth.app
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: ${{ steps.track.outputs.track }}
          status: completed

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/keystore.properties
          rm -f play-service-account.json
