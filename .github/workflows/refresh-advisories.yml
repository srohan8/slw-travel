name: Refresh conflict-zone advisories

on:
  schedule:
    # Runs daily at 06:00 UTC (FCDO updates overnight UK time)
    - cron: '0 6 * * *'
  workflow_dispatch:        # ← lets you trigger it manually from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: proxy/package.json

      - name: Install dependencies
        run: npm install

      - name: Run advisory refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node refresh-advisories.js
